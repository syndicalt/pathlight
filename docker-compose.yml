# Pathlight — self-hosted agent observability.
#
# Quick start:
#   docker compose up -d
#   Dashboard:  http://localhost:3100
#   Collector:  http://localhost:4100
#
# Data is persisted in the named `pathlight_data` volume. Remove the volume
# to start fresh: `docker compose down -v`.
#
# On first run, `docker compose up` will pull prebuilt images from GHCR if
# available, otherwise it builds locally (takes ~2 min first time).

services:
  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    image: ghcr.io/syndicalt/pathlight-collector:latest
    container_name: pathlight-collector
    ports:
      - "4100:4100"
    volumes:
      - pathlight_data:/data
    environment:
      - DATABASE_URL=file:/data/pathlight.db
      - PORT=4100
      # Docker needs a public container bind. Set PATHLIGHT_ACCESS_TOKEN below
      # when exposing this stack beyond your local machine.
      - PATHLIGHT_HOST=0.0.0.0
      - PATHLIGHT_ACCESS_TOKEN=${PATHLIGHT_ACCESS_TOKEN:-}
      # Optional: enable LLM-span replay from the dashboard. Generic pair works
      # for any OpenAI-compatible gateway (Provara, Groq, Together, Ollama…)
      # and Anthropic; provider-specific pair is a fallback.
      - REPLAY_API_KEY=${REPLAY_API_KEY:-}
      - REPLAY_BASE_URL=${REPLAY_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Required to enable BYOK key endpoints (/v1/projects/:id/keys).
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
      - PATHLIGHT_SEAL_KEY=${PATHLIGHT_SEAL_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4100/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      # NEXT_PUBLIC_* is baked in at build time. The default targets the
      # host-mapped collector port, which Just Works for most users.
      args:
        NEXT_PUBLIC_COLLECTOR_URL: ${NEXT_PUBLIC_COLLECTOR_URL:-http://localhost:4100}
        NEXT_PUBLIC_PATHLIGHT_ACCESS_TOKEN: ${PATHLIGHT_ACCESS_TOKEN:-}
    image: ghcr.io/syndicalt/pathlight-web:latest
    container_name: pathlight-web
    ports:
      - "3100:3100"
    depends_on:
      collector:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pathlight_data:
